services:
  - type: web
    name: company-brain-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
